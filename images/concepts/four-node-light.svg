<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="Four nodes connected by continuation edges, ending with a fork">
  <defs>
    <filter id="fn-shadow-light" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-color="#0a0a0a" flood-opacity="0.06"/>
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#0a0a0a" flood-opacity="0.04"/>
    </filter>
  </defs>
  <rect width="720" height="200" fill="transparent"/>

  <!-- continuation edges -->
  <path d="M 130 100 L 200 100" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 320 100 L 390 100" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 510 100 L 580 100" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/>
  <!-- fork edge from node 4 down -->
  <path d="M 640 130 C 640 160, 600 170, 540 170" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4 4"/>

  <!-- node 1: you -->
  <g filter="url(#fn-shadow-light)">
    <rect x="20" y="70" width="110" height="60" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
    <circle cx="36" cy="86" r="3" fill="#d97757"/>
    <text x="48" y="89" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" fill="#6b7280" letter-spacing="0.04em">YOU</text>
    <rect x="34" y="100" width="84" height="5" rx="2" fill="#e5e7eb"/>
    <rect x="34" y="110" width="60" height="5" rx="2" fill="#e5e7eb"/>
  </g>
  <!-- node 2: assistant -->
  <g filter="url(#fn-shadow-light)">
    <rect x="200" y="70" width="120" height="60" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
    <circle cx="216" cy="86" r="3" fill="#3b82f6"/>
    <text x="228" y="89" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" fill="#6b7280" letter-spacing="0.04em">ASSISTANT</text>
    <rect x="214" y="100" width="94" height="5" rx="2" fill="#e5e7eb"/>
    <rect x="214" y="110" width="74" height="5" rx="2" fill="#e5e7eb"/>
  </g>
  <!-- node 3: you -->
  <g filter="url(#fn-shadow-light)">
    <rect x="390" y="70" width="120" height="60" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
    <circle cx="406" cy="86" r="3" fill="#d97757"/>
    <text x="418" y="89" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" fill="#6b7280" letter-spacing="0.04em">YOU</text>
    <rect x="404" y="100" width="94" height="5" rx="2" fill="#e5e7eb"/>
    <rect x="404" y="110" width="68" height="5" rx="2" fill="#e5e7eb"/>
  </g>
  <!-- node 4: assistant -->
  <g filter="url(#fn-shadow-light)">
    <rect x="580" y="70" width="120" height="60" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
    <circle cx="596" cy="86" r="3" fill="#3b82f6"/>
    <text x="608" y="89" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" fill="#6b7280" letter-spacing="0.04em">ASSISTANT</text>
    <rect x="594" y="100" width="94" height="5" rx="2" fill="#e5e7eb"/>
    <rect x="594" y="110" width="80" height="5" rx="2" fill="#e5e7eb"/>
  </g>
  <!-- forked branch -->
  <g filter="url(#fn-shadow-light)" opacity="0.85">
    <rect x="430" y="155" width="110" height="35" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="442" y="178" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" fill="#3b82f6" letter-spacing="0.04em">FORK · B2-1</text>
  </g>
</svg>
