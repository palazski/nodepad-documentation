<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="NodePad canvas with branched conversations, a merge, a reference, and a text note">
  <defs>
    <pattern id="grid-dark" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <filter id="card-shadow-dark" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.4"/>
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="#0a0a0f"/>
  <rect width="800" height="500" fill="url(#grid-dark)"/>

  <!-- edges -->
  <path d="M 220 110 C 320 110, 320 200, 420 200" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 180 130 C 200 200, 220 240, 280 320" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4 4"/>
  <path d="M 280 360 C 360 360, 360 410, 420 410" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 580 220 C 660 220, 700 280, 700 320" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 580 410 C 660 410, 700 380, 700 340" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 560 70 C 540 100, 520 150, 510 195" fill="none" stroke="#c084fc" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2 4"/>

  <!-- node: user message -->
  <g filter="url(#card-shadow-dark)">
    <rect x="60" y="80" width="160" height="60" rx="10" fill="#161620" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <circle cx="78" cy="100" r="3" fill="#d97757"/>
    <text x="92" y="103" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" fill="#9ca3af" letter-spacing="0.04em">YOU · B1-1</text>
    <rect x="76" y="114" width="120" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
    <rect x="76" y="124" width="84" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
  </g>

  <!-- node: assistant reply -->
  <g filter="url(#card-shadow-dark)">
    <rect x="420" y="170" width="160" height="80" rx="10" fill="#161620" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <circle cx="438" cy="190" r="3" fill="#60a5fa"/>
    <text x="452" y="193" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" fill="#9ca3af" letter-spacing="0.04em">ASSISTANT · B1-2</text>
    <rect x="436" y="204" width="128" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
    <rect x="436" y="214" width="120" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
    <rect x="436" y="224" width="100" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
    <rect x="436" y="234" width="80" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
  </g>

  <!-- node: alt user message -->
  <g filter="url(#card-shadow-dark)">
    <rect x="120" y="320" width="160" height="60" rx="10" fill="#161620" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <circle cx="138" cy="340" r="3" fill="#d97757"/>
    <text x="152" y="343" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" fill="#9ca3af" letter-spacing="0.04em">YOU · B2-1</text>
    <rect x="136" y="354" width="120" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
    <rect x="136" y="364" width="68" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
  </g>

  <!-- node: alt assistant reply -->
  <g filter="url(#card-shadow-dark)">
    <rect x="420" y="380" width="160" height="60" rx="10" fill="#161620" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <circle cx="438" cy="400" r="3" fill="#60a5fa"/>
    <text x="452" y="403" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" fill="#9ca3af" letter-spacing="0.04em">ASSISTANT · B2-2</text>
    <rect x="436" y="414" width="120" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
    <rect x="436" y="424" width="100" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
  </g>

  <!-- merged draft -->
  <g filter="url(#card-shadow-dark)">
    <rect x="640" y="290" width="120" height="60" rx="10" fill="#161620" stroke="#4ade80" stroke-width="1.5"/>
    <text x="652" y="310" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" fill="#4ade80" letter-spacing="0.04em">MERGE · B3-1</text>
    <rect x="652" y="320" width="92" height="6" rx="3" fill="rgba(74,222,128,0.18)"/>
    <rect x="652" y="330" width="68" height="6" rx="3" fill="rgba(74,222,128,0.18)"/>
  </g>

  <!-- text note -->
  <g filter="url(#card-shadow-dark)">
    <rect x="600" y="40" width="140" height="60" rx="6" fill="#3b2f0e" stroke="#a16207" stroke-width="1"/>
    <text x="612" y="58" font-family="ui-monospace, SFMono-Regular, monospace" font-size="8" fill="#fde68a" letter-spacing="0.04em">NOTE</text>
    <rect x="612" y="66" width="110" height="5" rx="2" fill="rgba(253,230,138,0.4)"/>
    <rect x="612" y="74" width="90" height="5" rx="2" fill="rgba(253,230,138,0.4)"/>
    <rect x="612" y="82" width="100" height="5" rx="2" fill="rgba(253,230,138,0.4)"/>
  </g>
</svg>
