<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="NodePad canvas with branched conversations, a merge, a reference, and a text note">
  <defs>
    <pattern id="grid-light" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    </pattern>
    <filter id="card-shadow-light" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-color="#0a0a0a" flood-opacity="0.06"/>
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#0a0a0a" flood-opacity="0.04"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="#ffffff"/>
  <rect width="800" height="500" fill="url(#grid-light)" opacity="0.55"/>

  <!-- continuation edge: user → assistant -->
  <path d="M 220 110 C 320 110, 320 200, 420 200" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/>
  <!-- fork edge: user → alt user (blue) -->
  <path d="M 180 130 C 200 200, 220 240, 280 320" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4 4"/>
  <!-- continuation edge: alt user → alt assistant -->
  <path d="M 280 360 C 360 360, 360 410, 420 410" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/>
  <!-- merge edges: assistant + alt assistant → merged response -->
  <path d="M 580 220 C 660 220, 700 280, 700 320" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 580 410 C 660 410, 700 380, 700 340" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- reference edge: note → assistant (violet, dashed) -->
  <path d="M 560 70 C 540 100, 520 150, 510 195" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2 4"/>

  <!-- node: user message (top left) -->
  <g filter="url(#card-shadow-light)">
    <rect x="60" y="80" width="160" height="60" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <circle cx="78" cy="100" r="3" fill="#d97757"/>
    <text x="92" y="103" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" fill="#6b7280" letter-spacing="0.04em">YOU · B1-1</text>
    <rect x="76" y="114" width="120" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="76" y="124" width="84" height="6" rx="3" fill="#e5e7eb"/>
  </g>

  <!-- node: assistant reply (main branch) -->
  <g filter="url(#card-shadow-light)">
    <rect x="420" y="170" width="160" height="80" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <circle cx="438" cy="190" r="3" fill="#3b82f6"/>
    <text x="452" y="193" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" fill="#6b7280" letter-spacing="0.04em">ASSISTANT · B1-2</text>
    <rect x="436" y="204" width="128" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="436" y="214" width="120" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="436" y="224" width="100" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="436" y="234" width="80" height="6" rx="3" fill="#e5e7eb"/>
  </g>

  <!-- node: alt user message (forked branch) -->
  <g filter="url(#card-shadow-light)">
    <rect x="120" y="320" width="160" height="60" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <circle cx="138" cy="340" r="3" fill="#d97757"/>
    <text x="152" y="343" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" fill="#6b7280" letter-spacing="0.04em">YOU · B2-1</text>
    <rect x="136" y="354" width="120" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="136" y="364" width="68" height="6" rx="3" fill="#e5e7eb"/>
  </g>

  <!-- node: alt assistant reply -->
  <g filter="url(#card-shadow-light)">
    <rect x="420" y="380" width="160" height="60" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <circle cx="438" cy="400" r="3" fill="#3b82f6"/>
    <text x="452" y="403" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" fill="#6b7280" letter-spacing="0.04em">ASSISTANT · B2-2</text>
    <rect x="436" y="414" width="120" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="436" y="424" width="100" height="6" rx="3" fill="#e5e7eb"/>
  </g>

  <!-- merged draft (right side) -->
  <g filter="url(#card-shadow-light)">
    <rect x="640" y="290" width="120" height="60" rx="10" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
    <text x="652" y="310" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" fill="#22c55e" letter-spacing="0.04em">MERGE · B3-1</text>
    <rect x="652" y="320" width="92" height="6" rx="3" fill="#dcfce7"/>
    <rect x="652" y="330" width="68" height="6" rx="3" fill="#dcfce7"/>
  </g>

  <!-- text note (top right, sticky yellow) -->
  <g filter="url(#card-shadow-light)">
    <rect x="600" y="40" width="140" height="60" rx="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
    <text x="612" y="58" font-family="ui-monospace, SFMono-Regular, monospace" font-size="8" fill="#92400e" letter-spacing="0.04em">NOTE</text>
    <rect x="612" y="66" width="110" height="5" rx="2" fill="#fde68a"/>
    <rect x="612" y="74" width="90" height="5" rx="2" fill="#fde68a"/>
    <rect x="612" y="82" width="100" height="5" rx="2" fill="#fde68a"/>
  </g>
</svg>
